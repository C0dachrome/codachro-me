<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Dashboard</title>
    <link rel="stylesheet" href="../styles.css?v=3">
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <script>
        // Verify session server-side first (reliable). If the server check
        // returns 401, redirect to login. If the check can't be reached
        // (network error), fall back to the localStorage token for dev.
        (async function () {
            try {
                const res = await fetch('/checksession', { method: 'GET', credentials: 'same-origin' });
                if (res.ok) {
                    // Session is valid — do nothing and allow the page to render.
                    return;
                }
                // Not authenticated — redirect to login
                window.location.href = '/dashboard/login.html';
            } catch (err) {
                // Fetch failed (likely local dev where functions aren't running).
                // Fall back to the client-side token saved by the login form.
                try {
                    const token = localStorage.getItem('token');
                    if (!token) {
                        window.location.href = '/dashboard/login.html';
                    }
                } catch (e) {
                    window.location.href = '/dashboard/login.html';
                }
            }
        })();
    </script>
</head>

<body>

    <header class="topbar" role="banner">
        <img src="/images/logo-ryo.png" class="brand" id="logo" aria-label="codachrome home">
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>

        <nav role="navigation" aria-label="Main navigation">
            <ul class="nav-list" role="menubar">
                <li role="none"><a href="/" role="menuitem" class="tab-link">Home</a></li>
                <li role="none"><a href="maindash.html" role="menuitem" class="tab-link">Main Dashboard</a></li>
                <li role="none"><a href="sedash.html" role="menuitem" class="tab-link">SpecEye</a></li>
            </ul>
        </nav>
    </header>

    <div id="header">
        <h2>Main Dashboard</h2>
    </div>

    <div id="container">
        <section id="main">
            <div id="panel-todo" class="panel active card">
                <h3>My To-Do List</h3>
                
                <form id="todo-form">
                    <div class="form-group">
                        <label for="todo-title">Task Title:</label>
                        <input type="text" id="todo-title" placeholder="Enter task title" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="todo-description">Description:</label>
                        <textarea id="todo-description" placeholder="Add task details (optional)"></textarea>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="todo-priority">Priority:</label>
                            <select id="todo-priority">
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                                <option value="critical">Critical</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="todo-due">Due Date:</label>
                            <input type="date" id="todo-due">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-primary">Add Task</button>
                </form>

                <div id="todo-list"></div>

                <script>
                    const todoForm = document.getElementById('todo-form');
                    const todoTitle = document.getElementById('todo-title');
                    const todoDescription = document.getElementById('todo-description');
                    const todoPriority = document.getElementById('todo-priority');
                    const todoDue = document.getElementById('todo-due');
                    const todoList = document.getElementById('todo-list');
                    const STORAGE_KEY = 'codachrome_todos';
                    let isLoading = false;

                    // Load todos from server
                    async function loadTodos() {
                        try {
                            const response = await fetch('/todos', { 
                                method: 'GET',
                                credentials: 'same-origin'
                            });
                            
                            if (response.ok) {
                                return await response.json();
                            } else if (response.status === 401) {
                                // Redirect to login if unauthorized
                                window.location.href = '/dashboard/login.html';
                                return [];
                            } else {
                                // Fallback to localStorage if server fails
                                console.warn('Server todos failed, using local storage');
                                const stored = localStorage.getItem(STORAGE_KEY);
                                return stored ? JSON.parse(stored) : [];
                            }
                        } catch (error) {
                            console.error('Error loading todos:', error);
                            // Fallback to localStorage on network error
                            const stored = localStorage.getItem(STORAGE_KEY);
                            return stored ? JSON.parse(stored) : [];
                        }
                    }

                    // Save todos to server
                    async function saveTodos(todos) {
                        try {
                            const response = await fetch('/todos', {
                                method: 'POST',
                                credentials: 'same-origin',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify(todos)
                            });
                            
                            if (!response.ok) {
                                throw new Error('Failed to save todos');
                            }
                            
                            // Also save to localStorage as backup
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
                        } catch (error) {
                            console.error('Error saving todos to server:', error);
                            // Still save to localStorage as fallback
                            localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
                        }
                    }

                    // Render todo list
                    async function renderTodos() {
                        if (isLoading) return;
                        isLoading = true;
                        
                        const todos = await loadTodos();
                        todoList.innerHTML = '';

                        if (todos.length === 0) {
                            todoList.innerHTML = '<p class="empty-state">No tasks yet. Add one to get started!</p>';
                            isLoading = false;
                            return;
                        }

                        // Sort by priority and due date
                        const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
                        todos.sort((a, b) => {
                            if (a.completed !== b.completed) return a.completed ? 1 : -1;
                            if (priorityOrder[a.priority] !== priorityOrder[b.priority]) {
                                return priorityOrder[a.priority] - priorityOrder[b.priority];
                            }
                            return new Date(a.due || '9999-12-31') - new Date(b.due || '9999-12-31');
                        });

                        todos.forEach((todo) => {
                            const todoItem = document.createElement('div');
                            todoItem.className = `todo-item priority-${todo.priority} ${todo.completed ? 'completed' : ''}`;
                            
                            const dueDate = todo.due ? new Date(todo.due).toLocaleDateString() : 'No due date';
                            const isOverdue = todo.due && new Date(todo.due) < new Date() && !todo.completed ? 'overdue' : '';

                            todoItem.innerHTML = `
                                <div class="todo-content">
                                    <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})">
                                    <div class="todo-text">
                                        <h4>${escapeHtml(todo.title)}</h4>
                                        ${todo.description ? `<p>${escapeHtml(todo.description)}</p>` : ''}
                                        <div class="todo-meta">
                                            <span class="priority-badge">${todo.priority}</span>
                                            <span class="due-date ${isOverdue}">${dueDate}</span>
                                        </div>
                                    </div>
                                </div>
                                <button class="btn-delete" onclick="deleteTodo(${todo.id})">×</button>
                            `;
                            todoList.appendChild(todoItem);
                        });
                        
                        isLoading = false;
                    }

                    // Add new todo
                    async function addTodo(e) {
                        e.preventDefault();

                        const todos = await loadTodos();
                        const newTodo = {
                            id: Date.now(),
                            title: todoTitle.value,
                            description: todoDescription.value,
                            priority: todoPriority.value,
                            due: todoDue.value,
                            completed: false,
                            created: new Date().toISOString()
                        };

                        todos.push(newTodo);
                        await saveTodos(todos);

                        // Reset form
                        todoForm.reset();
                        todoPriority.value = 'medium';
                        
                        renderTodos();
                    }

                    // Toggle todo completion
                    async function toggleTodo(id) {
                        const todos = await loadTodos();
                        const todo = todos.find(t => t.id === id);
                        if (todo) {
                            todo.completed = !todo.completed;
                            await saveTodos(todos);
                            renderTodos();
                        }
                    }

                    // Delete todo
                    async function deleteTodo(id) {
                        if (confirm('Delete this task?')) {
                            const todos = await loadTodos();
                            const index = todos.findIndex(t => t.id === id);
                            if (index !== -1) {
                                todos.splice(index, 1);
                                await saveTodos(todos);
                                renderTodos();
                            }
                        }
                    }

                    // Utility function to escape HTML
                    function escapeHtml(text) {
                        const map = {
                            '&': '&amp;',
                            '<': '&lt;',
                            '>': '&gt;',
                            '"': '&quot;',
                            "'": '&#039;'
                        };
                        return text.replace(/[&<>"']/g, m => map[m]);
                    }

                    // Initialize
                    todoForm.addEventListener('submit', addTodo);
                    renderTodos();
                </script>
            </div>
        </section>
    </div>
    <script>
        (function(){
            const toggle = document.querySelector('.nav-toggle');
            const nav = document.querySelector('.nav-list');
            if(!toggle) return;

            function closeNav(){ toggle.setAttribute('aria-expanded','false'); document.body.classList.remove('nav-open'); }
            function openNav(){ toggle.setAttribute('aria-expanded','true'); document.body.classList.add('nav-open'); }

            toggle.addEventListener('click', ()=>{ const expanded = toggle.getAttribute('aria-expanded') === 'true'; if(expanded) closeNav(); else openNav(); });
            window.addEventListener('resize', ()=>{ if(window.innerWidth > 800) closeNav(); });
            if(nav) nav.querySelectorAll('a').forEach(a=> a.addEventListener('click', closeNav));
            document.addEventListener('click', (e)=>{ if(!document.body.classList.contains('nav-open')) return; if(toggle.contains(e.target) || (nav && nav.contains(e.target))) return; closeNav(); });
        })();
    </script>
</body>

</html>
